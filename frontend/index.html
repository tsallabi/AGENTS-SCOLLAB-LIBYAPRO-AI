// FLOATING CHAT WIDGET (visitor → admin live chat)
// ============================================================
function ChatWidget() {
  const [open, setOpen] = useState(false);
  const [token, setToken] = useState(() => localStorage.getItem('lp_chat_token'));
  const [thread, setThread] = useState(null);
  const [error, setError] = useState('');
  const [text, setText] = useState('');
  const [sending, setSending] = useState(false);
  const scrollRef = useRef(null);

  // Polling while open
  useEffect(() => {
    if (!open || !token) return;
    let cancelled = false;
    const fetchThread = async () => {
      try {
        const t = await api(`/support/threads/${token}`);
        if (!cancelled) setThread(t);
      } catch (e) {
        if (e.status === 404) {
          // token expired/invalid - clear
          localStorage.removeItem('lp_chat_token');
          setToken(null);
          setThread(null);
        }
      }
    };
    fetchThread();
    const id = setInterval(fetchThread, 4000);
    return () => { cancelled = true; clearInterval(id); };
  }, [open, token]);

  // Auto-scroll
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [thread?.messages?.length]);

  async function startChat(e) {
    e.preventDefault();
    setSending(true); setError('');
    const fd = new FormData(e.target);
    try {
      const r = await api('/support/chat/start', {
        method: 'POST',
        body: JSON.stringify({
          name: fd.get('name'),
          email: fd.get('email'),
          phone: fd.get('phone') || null,
          initial_message: fd.get('message'),
        }),
      });
      localStorage.setItem('lp_chat_token', r.visitor_token);
      setToken(r.visitor_token);
    } catch (e) { setError(e.message); }
    finally { setSending(false); }
  }

  async function send() {
    const t = text.trim();
    if (!t || sending) return;
    setSending(true); setError('');
    try {
      await api(`/support/threads/${token}/messages`, {
        method: 'POST',
        body: JSON.stringify({ content: t }),
      });
      setText('');
      // Optimistic refresh
      const updated = await api(`/support/threads/${token}`);
      setThread(updated);
    } catch (e) { setError(e.message); }
    finally { setSending(false); }
  }

  function reset() {
    if (!confirm('بدء محادثة جديدة؟ ستفقد المحادثة الحالية.')) return;
    localStorage.removeItem('lp_chat_token');
    setToken(null); setThread(null);
  }

  // Closed bubble
  if (!open) {
    return (
      <button
        onClick={() => setOpen(true)}
        className="fixed bottom-6 left-6 z-50 bg-ink hover:bg-brand smooth text-white rounded-full shadow-2xl shadow-ink/30 px-5 py-3 flex items-center gap-2 font-semibold text-sm"
        style={{boxShadow:'0 12px 32px -8px rgba(26,26,26,0.4)'}}
        aria-label="فتح الدردشة">
        <Icon name="chat" className="w-4 h-4" />
        <span>هل تحتاج مساعدة؟</span>
        {thread?.messages?.some(m => m.sender === 'admin' && (!thread.last_visitor_view_at || new Date(m.created_at) > new Date(thread.last_visitor_view_at))) && (
          <span className="w-2 h-2 rounded-full bg-brand breathe"></span>
        )}
      </button>
    );
  }

  return (
    <div className="fixed bottom-6 left-6 z-50 w-[360px] max-w-[calc(100vw-3rem)] h-[520px] max-h-[calc(100vh-3rem)] flex flex-col card-elevated rounded-2xl overflow-hidden fade-in" style={{boxShadow:'0 24px 48px -12px rgba(0,0,0,0.25)'}}>
      {/* Header */}
      <div className="flex items-center justify-between px-4 py-3 bg-ink text-paper">
        <div className="flex items-center gap-2.5">
          <span className="lp-mark" style={{width:24,height:24}}><span></span></span>
          <div className="leading-tight">
            <div className="text-sm font-bold">دعم ليبيا برو AI</div>
            <div className="text-[10px] text-paper/60">عادةً نرد خلال ساعات</div>
          </div>
        </div>
        <div className="flex items-center gap-1">
          {token && (
            <button onClick={reset} title="محادثة جديدة" className="text-paper/70 hover:text-paper p-1 smooth">
              <Icon name="plus" className="w-4 h-4" />
            </button>
          )}
          <button onClick={() => setOpen(false)} className="text-paper/70 hover:text-paper p-1 smooth">
            <Icon name="close" className="w-4 h-4" />
          </button>
        </div>
      </div>

      {/* Body */}
      {!token ? (
        <form onSubmit={startChat} className="flex-1 overflow-y-auto p-5 space-y-3 bg-paper">
          <div className="text-center mb-2">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-brand-soft text-brand mb-3">
              <Icon name="chat" className="w-5 h-5" />
            </div>
            <h3 className="font-bold text-base mb-1 tracking-tight">مرحباً بك</h3>
            <p className="text-xs text-ink-muted">اكتب اسمك وبريدك لنبدأ المحادثة</p>
          </div>
          <input name="name" required minLength={2} placeholder="الاسم *"
            className="w-full bg-paper-soft border border-line rounded-lg px-3 py-2.5 text-sm focus:border-brand focus-ring smooth" />
          <input name="email" type="email" required dir="ltr" placeholder="البريد الإلكتروني *"
            className="w-full bg-paper-soft border border-line rounded-lg px-3 py-2.5 text-sm focus:border-brand focus-ring smooth" />
          <input name="phone" type="tel" dir="ltr" placeholder="+218 ... (اختياري)"
            className="w-full bg-paper-soft border border-line rounded-lg px-3 py-2.5 text-sm focus:border-brand focus-ring smooth" />
          <textarea name="message" required minLength={5} rows={3} placeholder="ما الذي تريد معرفته؟ *"
            className="w-full bg-paper-soft border border-line rounded-lg px-3 py-2.5 text-sm focus:border-brand focus-ring smooth resize-none" />
          {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-xs">{error}</div>}
          <Btn type="submit" variant="primary" size="md" disabled={sending} className="w-full">
            {sending ? '...' : 'بدء المحادثة'}
          </Btn>
          <p className="text-[10px] text-ink-dim text-center pt-1">بإرسال الرسالة، توافق على <a href="#/privacy" className="text-brand">سياسة الخصوصية</a></p>
        </form>
      ) : (
        <>
          <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-paper-soft">
            {!thread ? (
              <div className="text-center text-ink-dim text-sm pt-8">جارٍ التحميل...</div>
            ) : thread.messages.length === 0 ? (
              <div className="text-center text-ink-dim text-sm pt-8">
                <p>تم بدء المحادثة</p>
                <p className="text-xs mt-1">ابدأ بكتابة رسالتك</p>
              </div>
            ) : thread.messages.map(m => (
              <ChatBubble key={m.id} msg={m} />
            ))}
            {thread?.messages?.length > 0 && thread.status === 'open' && !thread.messages.some(m => m.sender === 'admin') && (
              <div className="text-xs text-ink-dim text-center py-2 italic">
                سنرد عليك قريباً ✨
              </div>
            )}
          </div>
          <div className="border-t border-line p-3 bg-surface">
            {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-md px-2 py-1 text-xs mb-2">{error}</div>}
            <div className="flex gap-2 items-end">
              <textarea
                value={text} onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                placeholder="اكتب رسالتك..." rows={1}
                className="flex-1 bg-paper-soft border border-line rounded-lg px-3 py-2 text-sm focus:border-brand focus-ring smooth resize-none max-h-[120px]" />
              <Btn variant="primary" size="sm" onClick={send} disabled={!text.trim() || sending}>
                <Icon name="send" className="w-4 h-4" />
              </Btn>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

function ChatBubble({ msg }) {
  const isAdmin = msg.sender === 'admin';
  return (
    <div className={`flex gap-2 fade-in ${isAdmin ? '' : 'flex-row-reverse'}`}>
      <div className={`w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold ${
        isAdmin ? 'bg-brand-soft text-brand border border-brand/30' : 'bg-paper-soft text-ink border border-line'
      }`}>
        {isAdmin ? 'L' : (msg.sender_name?.charAt(0) || '?')}
      </div>
      <div className="max-w-[75%]">
        <div className={`px-3 py-2 rounded-2xl text-sm leading-relaxed ${
          isAdmin
            ? 'bg-surface border border-line rounded-tr-md'
            : 'bg-ink text-paper rounded-tl-md'
        }`}>
          {msg.content}
        </div>
        <div className={`text-[10px] text-ink-dim mt-1 ${isAdmin ? '' : 'text-left'}`}>
          {new Date(msg.created_at).toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'})}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ROOT
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [authMode, setAuthMode] = useState(null);
  const [loading, setLoading] = useState(true);
  const [oauthError, setOauthError] = useState('');
  const route = useHashRoute();

  // معالجة العودة من Google OAuth
  useEffect(() => {
    // 1. فحص URL hash للتوكن (من /auth-google-success?token=...)
    const hash = window.location.hash;
    if (hash.includes('auth-google-success')) {
      const m = hash.match(/token=([^&]+)/);
      if (m && m[1]) {
        setToken(m[1]);
        // امسح hash
        window.history.replaceState({}, '', window.location.pathname);
      }
    }
    // 2. فحص query لأخطاء OAuth
    const url = new URL(window.location.href);
    const err = url.searchParams.get('google_error');
    if (err) {
      setOauthError(`فشل تسجيل الدخول بـ Google: ${err}`);
      url.searchParams.delete('google_error');
      window.history.replaceState({}, '', url.pathname + url.hash);
    }
  }, []);

  useEffect(() => {
    const t = getToken();
    if (!t) { setLoading(false); return; }
    api('/auth/me').then(u => setUser(u)).catch(() => setToken(null)).finally(() => setLoading(false));
  }, []);

  // Public routes (always available, no login required)
  if (route === '/privacy') return <PrivacyPage />;
  if (route === '/terms')   return <TermsPage />;
  if (route === '/contact') return <ContactPage />;

  if (loading) {
    return <div className="h-full flex items-center justify-center bg-paper">
      <span className="lp-mark breathe" style={{width: 40, height: 40}}><span></span></span>
    </div>;
  }
  if (!user) {
    return (<>
      <Landing onCTA={(m) => setAuthMode(m)} />
      <ChatWidget />
      {authMode && <AuthModal initialMode={authMode} onAuth={u => { setUser(u); setAuthMode(null); }} onClose={() => setAuthMode(null)} />}
      {oauthError && (
        <div className="fixed top-6 right-6 z-[70] card-elevated rounded-xl p-4 max-w-sm fade-in border-2 border-red-200 bg-red-50">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1">
              <div className="text-sm font-bold text-red-800 mb-1">خطأ في تسجيل الدخول</div>
              <div className="text-xs text-red-700">{oauthError}</div>
            </div>
            <button onClick={() => setOauthError('')} className="text-red-700 hover:text-red-900"><Icon name="close" className="w-4 h-4" /></button>
          </div>
        </div>
      )}
    </>);
  }
  return <MainApp user={user} onLogout={() => setUser(null)} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
