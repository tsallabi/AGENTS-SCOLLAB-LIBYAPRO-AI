const API_BASE = window.location.origin + '/api';
const WS_BASE = (window.location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + window.location.host + '/api';

const getToken = () => localStorage.getItem('lp_token');
const setToken = (t) => t ? localStorage.setItem('lp_token', t) : localStorage.removeItem('lp_token');

async function api(path, options = {}) {
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  const t = getToken();
  if (t) headers['Authorization'] = `Bearer ${t}`;
  const res = await fetch(API_BASE + path, { ...options, headers });
  if (res.status === 204) return null;
  const text = await res.text();
  let body;
  try { body = text ? JSON.parse(text) : null; } catch { body = text; }
  if (!res.ok) {
    const err = new Error(typeof body === 'object' && body?.detail ? body.detail : (text || res.statusText));
    err.status = res.status; throw err;
  }
  return body;
}

marked.setOptions({

    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch (e) { return code; }
  },
  breaks: true, gfm: true,
});

const renderMarkdown = (text) => DOMPurify.sanitize(marked.parse(text || ''), { ADD_ATTR: ['target'] });

function extractCodeBlocks(text) {
  if (!text) return [];
  const re = /```(\w+)?\n([\s\S]*?)```/g;
  const blocks = []; let m;
  while ((m = re.exec(text)) !== null) {
    blocks.push({ lang: m[1] || 'text', code: m[2].trim() });
  }
  return blocks;
}

function useLang() {
  const [lang, setLang] = useState(() => localStorage.getItem('lp_lang') || 'ar');
  const change = (l) => {
    localStorage.setItem('lp_lang', l);
    setLang(l);
    document.documentElement.lang = l;
    document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
  };
  useEffect(() => {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  }, [lang]);
  const t = (key) => TRANSLATIONS[lang][key] || TRANSLATIONS.ar[key] || key;
  return { lang, t, setLang: change };
}

// Hash router (simple SPA routing without dependencies)
// ============================================================
function useHashRoute() {
  const [hash, setHash] = useState(() => window.location.hash || '#/');
  useEffect(() => {
    const onChange = () => setHash(window.location.hash || '#/');
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  return hash.replace(/^#/, '') || '/';
}

  ],

    'Help me decide: should I start an e-commerce store or an app?',
    'Critique my business idea: connecting freelancers with clients',

function HeroChatBox({ onCTA, lang, t }) {
  const [text, setText] = useState('');
  const taRef = useRef(null);
  const prompts = HERO_PROMPTS[lang] || HERO_PROMPTS.ar;

  const submit = () => {
    const v = text.trim();
    if (!v) return;
    // احفظ الـ prompt → بعد التسجيل سيُرسَل تلقائياً في أول جلسة
    localStorage.setItem('lp_pending_prompt', v);
    onCTA('signup');
  };

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  };

  const onChange = (e) => {
    setText(e.target.value);
    if (taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + 'px';
    }
  };

  const pickPrompt = (p) => {
    setText(p);
    if (taRef.current) {
      taRef.current.focus();
      setTimeout(() => {
        taRef.current.style.height = 'auto';
        taRef.current.style.height = Math.min(taRef.current.scrollHeight, 160) + 'px';
        taRef.current.setSelectionRange(p.length, p.length);
      }, 0);
    }
  };

  const placeholder = lang === 'ar'
    ? 'اطرح سؤالك هنا — وسترى Claude و GPT و Gemini يتداولون للوصول لأفضل إجابة...'
    : 'Ask anything — and watch Claude, GPT, and Gemini deliberate to find the best answer...';

  const tryItLabel = lang === 'ar' ? 'جرّب الآن مجاناً' : 'Try it now — free';
  const suggestionLabel = lang === 'ar' ? '✦ أمثلة لتجربتها' : '✦ Examples to try';

  return (
    <div>
      {/* Input box */}
      <div className="card-elevated rounded-2xl p-3 md:p-4 hover:border-brand/40 smooth focus-within:border-brand/60">
        <textarea
          ref={taRef}
          value={text}
          onChange={onChange}
          onKeyDown={onKey}
          rows={2}
          placeholder={placeholder}
          className="w-full bg-transparent resize-none focus:outline-none text-ink placeholder-ink-dim text-base leading-relaxed min-h-[56px] max-h-[160px]"
        />
        <div className="flex items-center justify-between mt-2 pt-2 border-t border-line">
          <div className="flex items-center gap-2 text-xs text-ink-dim font-medium">
            <span className="w-1.5 h-1.5 rounded-full bg-brand breathe"></span>
            <span>{lang === 'ar' ? '3 نماذج مستعدّة للتداول' : '3 models ready to debate'}</span>
          </div>
          <Btn variant="brand" size="md" onClick={submit} disabled={!text.trim()}>
            <span>{tryItLabel}</span>
            <Icon name="arrow_left" className="w-4 h-4" />
          </Btn>
        </div>
      </div>

      {/* Suggestions */}
      <div className="mt-5">
        <div className="text-center text-[11px] text-ink-dim font-bold tracking-widest uppercase mb-3">{suggestionLabel}</div>
        <div className="grid sm:grid-cols-2 gap-2">
          {prompts.map((p, i) => (
            <button key={i} onClick={() => pickPrompt(p)}
              className="card-soft hover:border-brand/40 hover:bg-paper-soft text-right p-3 rounded-xl smooth text-sm text-ink-muted hover:text-ink leading-relaxed group">
              <span className="text-brand opacity-50 group-hover:opacity-100 smooth ml-1.5">✦</span>
              <span>{p}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

  useEffect(() => {
    if (shown < messages.length) {
      const t = setTimeout(() => setShown(s => s + 1), 1700);
      return () => clearTimeout(t);
    }
    const t = setTimeout(() => setShown(1), 3000);
    return () => clearTimeout(t);
  }, [shown]);

  return (
    <div className="card-elevated rounded-2xl p-6 max-w-2xl mx-auto">
      <div className="flex items-center justify-between mb-5 pb-4 border-b border-line">
        <div className="text-xs font-semibold uppercase tracking-widest text-ink-dim">حوار حقيقي بين النماذج</div>
        <div className="flex gap-1">
          {[1,2,3,4].map(i => (
            <span key={i} className={`w-1.5 h-1.5 rounded-full smooth ${i <= shown ? 'bg-brand' : 'bg-line-strong'}`}></span>
          ))}
        </div>
      </div>
      <div className="space-y-4">
        {messages.slice(0, shown).map((m, i) => (
          <div key={i} className="flex gap-3 fade-in">
            <span className="w-2 h-2 rounded-full mt-2 flex-shrink-0" style={{ background: AGENT_META[m.agent].color }}></span>
            <div className="flex-1 text-sm">
              <div className="text-xs mb-1">
                <span className="font-semibold" style={{color: AGENT_META[m.agent].color}}>{AGENT_META[m.agent].name}</span>
                <span className="text-ink-dim mx-2">·</span>
                <span className="text-ink-dim">{m.phase}</span>
              </div>
              <div className="text-ink-muted leading-relaxed">{m.text}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function AuthModal({ initialMode, onAuth, onClose }) {
  const [mode, setMode] = useState(initialMode || 'login');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [name, setName] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const [googleEnabled, setGoogleEnabled] = useState(false);

  // تحقق من توفّر Google OAuth في الـ backend
  useEffect(() => {
    api('/auth/google/status').then(s => setGoogleEnabled(!!s.enabled)).catch(() => {});
  }, []);

  async function submit(e) {
    e.preventDefault(); setError(''); setLoading(true);
    try {
      const path = mode === 'login' ? '/auth/login' : '/auth/signup';
      const body = mode === 'login' ? { email, password } : { email, password, full_name: name || null };
      const data = await api(path, { method: 'POST', body: JSON.stringify(body) });
      setToken(data.access_token); onAuth(data.user);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }

  function googleLogin() {
    // ارجع إلى الصفحة الرئيسية بعد تسجيل الدخول
    window.location.href = `${API_BASE}/auth/google/login`;
  }

  return (
    <div className="fixed inset-0 z-50 bg-ink/50 flex items-center justify-center p-4 fade-in" onClick={onClose}>
      <div className="card-elevated rounded-2xl max-w-md w-full p-8 relative" onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-3 left-3 text-ink-dim hover:text-ink p-2 smooth"><Icon name="close" className="w-5 h-5" /></button>
        <div className="flex items-center justify-center mb-6"><Logo /></div>

        <div className="flex bg-paper-soft rounded-lg p-1 mb-6">
          <button type="button" onClick={() => setMode('login')}
            className={`flex-1 py-2 rounded-md smooth text-sm font-semibold ${mode === 'login' ? 'bg-surface text-ink shadow-sm' : 'text-ink-muted'}`}>
            تسجيل دخول
          </button>
          <button type="button" onClick={() => setMode('signup')}
            className={`flex-1 py-2 rounded-md smooth text-sm font-semibold ${mode === 'signup' ? 'bg-surface text-ink shadow-sm' : 'text-ink-muted'}`}>
            حساب جديد
          </button>
        </div>

        {/* Google sign-in button */}
        {googleEnabled && (
          <>
            <button type="button" onClick={googleLogin}
              className="w-full bg-surface border border-line hover:border-line-strong hover:bg-paper-soft rounded-lg py-2.5 px-4 text-sm font-semibold text-ink smooth flex items-center justify-center gap-2.5">
              <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
                <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
                <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
                <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
              </svg>
              <span>المتابعة بحساب Google</span>
            </button>
            <div className="flex items-center gap-3 my-5">
              <div className="flex-1 h-px bg-line"></div>
              <span className="text-xs text-ink-dim font-semibold">أو</span>
              <div className="flex-1 h-px bg-line"></div>
            </div>
          </>
        )}

        <form onSubmit={submit} className="space-y-3">
          {mode === 'signup' && (
            <input type="text" value={name} onChange={e => setName(e.target.value)} placeholder="الاسم (اختياري)"
              className="w-full bg-paper-soft border border-line rounded-lg px-4 py-3 smooth focus:border-brand focus-ring text-sm" />
          )}
          <input type="email" required value={email} onChange={e => setEmail(e.target.value)} placeholder="البريد الإلكتروني" dir="ltr"
            className="w-full bg-paper-soft border border-line rounded-lg px-4 py-3 smooth focus:border-brand focus-ring text-sm" />
          <input type="password" required minLength={8} value={password} onChange={e => setPassword(e.target.value)} placeholder="كلمة المرور (8+ أحرف)"
            className="w-full bg-paper-soft border border-line rounded-lg px-4 py-3 smooth focus:border-brand focus-ring text-sm" />
          {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-sm">{error}</div>}
          <Btn type="submit" variant="primary" size="lg" disabled={loading} className="w-full">
            {loading ? '...' : (mode === 'login' ? 'دخول' : 'إنشاء الحساب')}
          </Btn>
        </form>
      </div>
    </div>
  );
}

        {editing ? (
          <input autoFocus value={title} onChange={e => setTitle(e.target.value)}
            onBlur={() => { setEditing(false); if (title.trim() && title !== session.title) onRename(title.trim()); else setTitle(session.title); }}
            onKeyDown={e => { if (e.key === 'Enter') e.target.blur(); if (e.key === 'Escape') { setTitle(session.title); setEditing(false); } }}
            className="flex-1 bg-paper-soft border border-brand rounded px-2 py-1 text-sm focus:outline-none focus-ring" />

          <button onClick={onSelect} className="flex-1 text-right truncate text-sm py-0.5 px-1 flex items-center gap-2">

function PhaseBanner({ phase }) {

function Bubble({ msg, isStreaming }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    ref.current.querySelectorAll('pre code').forEach(b => {
      if (!b.dataset.highlighted) { hljs.highlightElement(b); b.dataset.highlighted = 'true'; }
    });
    ref.current.querySelectorAll('pre').forEach(pre => {
      if (pre.dataset.copyAdded) return;
      pre.dataset.copyAdded = 'true';
      pre.style.position = 'relative';
      const btn = document.createElement('button');
      btn.textContent = 'نسخ';
      btn.style.cssText = 'position:absolute;top:8px;left:8px;font-size:11px;padding:3px 9px;background:#FFFFFF;color:#5A5A5A;border-radius:6px;border:1px solid #E8E5DD;cursor:pointer;font-family:Cairo;font-weight:600;';
      btn.onmouseover = () => { btn.style.background = '#1A1A1A'; btn.style.color = '#fff'; btn.style.borderColor = '#1A1A1A'; };
      btn.onmouseout = () => { btn.style.background = '#FFFFFF'; btn.style.color = '#5A5A5A'; btn.style.borderColor = '#E8E5DD'; };
      btn.onclick = () => {
        navigator.clipboard.writeText(pre.querySelector('code').innerText);
        btn.textContent = '✓ تم'; setTimeout(() => btn.textContent = 'نسخ', 1500);
      };
      pre.appendChild(btn);
    });
  }, [msg.content, isStreaming]);

  if (msg.role === 'user') {
    return (
      <div className="flex gap-3 fade-in">
        <div className="w-7 h-7 rounded-lg bg-paper-soft flex items-center justify-center flex-shrink-0 text-ink">
          <Icon name="user" className="w-4 h-4" strokeWidth={1.8} />
        </div>
        <div className="flex-1 min-w-0 pt-0.5">
          <div className="text-xs text-ink-dim mb-1 font-semibold">أنت</div>
          <div className="markdown-body text-ink whitespace-pre-wrap">{msg.content}</div>
        </div>
      </div>
    );
  }

  const meta = AGENT_META[msg.agent_id] || { name: msg.agent_id, color: '#888' };
  const [playing, setPlaying] = useState(false);
  const audioRef = useRef(null);

  async function playTTS() {
    if (playing && audioRef.current) {
      audioRef.current.pause();
      setPlaying(false);
      return;
    }
    setPlaying(true);
    try {
      // ❆ Manus Free TTS - بدون OpenAI API key
      const text = msg.content.replace(/[#*`>]/g, '').slice(0, 4000);
      const res = await fetch(`${API_BASE}/manus/tts/speak`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, lang: 'auto' }),
      });
      if (!res.ok) throw new Error(`TTS failed: ${res.status}`);
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audioRef.current = audio;
      audio.onended = () => { setPlaying(false); URL.revokeObjectURL(url); };
      audio.onerror = () => { setPlaying(false); };
      audio.play();
    } catch (e) {
      setPlaying(false);
      // fallback to browser TTS
      if (window.speechSynthesis) {
        const utt = new SpeechSynthesisUtterance(msg.content.slice(0, 500));
        utt.lang = 'ar-SA';
        utt.onend = () => setPlaying(false);
        window.speechSynthesis.speak(utt);
      } else {
        alert('فشل التحويل لصوت: ' + e.message);
        setPlaying(false);
      }
    }
  }

  return (
    <div className="flex gap-3 fade-in group">
      <div className="w-7 h-7 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold border"
        style={{ background: meta.color + '12', color: meta.color, borderColor: meta.color + '30' }}>
        {meta.name.charAt(0)}
      </div>
      <div className="flex-1 min-w-0 pt-0.5">
        <div className="flex items-center gap-2 text-xs mb-1">
          <span style={{ color: meta.color }} className="font-bold">{meta.name}</span>
          <span className="text-ink-dim">·</span>
          <span className="text-ink-dim">{meta.desc}</span>
          {!isStreaming && msg.content && (
            <button onClick={playTTS} title="❆ استمع مجاناً (Manus TTS)"
              className="opacity-0 group-hover:opacity-100 smooth p-1 rounded hover:bg-paper-soft text-ink-dim hover:text-amber-600">
              {playing ? (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-3.5 h-3.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />
                </svg>
              ) : (
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-3.5 h-3.5">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
                </svg>
              )}
            </button>
          )}
        </div>
        <div ref={ref} className={`markdown-body ${isStreaming ? 'typing' : ''}`}
          dangerouslySetInnerHTML={{ __html: renderMarkdown(msg.content) }} />
        {msg.cost_usd != null && !isStreaming && (
          <div className="text-[10px] text-ink-dim mt-2 font-mono">
            {msg.input_tokens}↓ {msg.output_tokens}↑ · ${(msg.cost_usd || 0).toFixed(6)}
          </div>
        )}
      </div>
    </div>
  );
}

// MANUS TOOLS PANEL - أدوات Manus الحصرية فوق صندوق الإدخال

function ManusToolsPanel({ onSend, disabled }) {
  const [showSearch, setShowSearch] = useState(false);
  const [showCodeRun, setShowCodeRun] = useState(false);
  const [searchQuery, setSearchQuery] = useState('');
  const [searching, setSearching] = useState(false);
  const [searchResults, setSearchResults] = useState(null);
  const [codeInput, setCodeInput] = useState('');
  const [codeRunning, setCodeRunning] = useState(false);
  const [codeResult, setCodeResult] = useState(null);
  const [imgPrompt, setImgPrompt] = useState('');
  const [showImgTool, setShowImgTool] = useState(false);
  const [imgGenerating, setImgGenerating] = useState(false);

  async function runWebSearch() {
    if (!searchQuery.trim()) return;
    setSearching(true);
    try {
      const res = await fetch(`${API_BASE}/manus/web-search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: searchQuery, max_results: 5 }),
      });
      const data = await res.json();
      if (data.success) {
        setSearchResults(data.results);
      } else {
        alert('فشل البحث: ' + (data.detail || 'error'));
      }
    } catch (e) {
      alert('خطأ في البحث: ' + e.message);
    } finally {
      setSearching(false);
    }
  }

  function addSearchToChat() {
    if (!searchResults || !searchResults.length) return;
    const md = `**نتائج بحث الويب:** "${searchQuery}"\n\n` +
      searchResults.map((r, i) => `${i+1}. **[${r.title}](${r.url})**\n   ${r.snippet}`).join('\n\n') +
      `\n\n_تم البحث بواسطة Manus DuckDuckGo - بدون API key_`;
    onSend(md);
    setShowSearch(false);
    setSearchResults(null);
    setSearchQuery('');
  }

  async function runCode() {
    if (!codeInput.trim()) return;
    setCodeRunning(true);
    setCodeResult(null);
    try {
      const res = await fetch(`${API_BASE}/manus/execute-code`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
        body: JSON.stringify({ code: codeInput, language: 'python' }),
      });
      const data = await res.json();
      setCodeResult(data);
    } catch (e) {
      setCodeResult({ success: false, output: '', error: e.message });
    } finally {
      setCodeRunning(false);
    }
  }

  async function generateManusImage() {
    if (!imgPrompt.trim()) return;
    setImgGenerating(true);
    try {
      const res = await fetch(`${API_BASE}/manus/generate-image`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
        body: JSON.stringify({ prompt: imgPrompt }),
      });
      if (res.ok) {
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const md = `**❆ صورة Manus AI:**\n\n![${imgPrompt}](${url})\n\n_Prompt: ${imgPrompt}_`;
        onSend(md);
        setShowImgTool(false);
        setImgPrompt('');
      } else {
        const err = await res.json();
        alert('فشل توليد الصورة: ' + (err.detail || res.status));
      }
    } catch (e) {
      alert('خطأ: ' + e.message);
    } finally {
      setImgGenerating(false);
    }
  }

  return (
    <div className="border-b border-line/50 bg-amber-50/30 dark:bg-amber-900/10">
      {/* Tools Bar */}
      <div className="max-w-3xl mx-auto px-3 py-1.5 flex items-center gap-2 flex-wrap">
        <span className="text-[10px] font-bold uppercase tracking-widest text-amber-600 opacity-70">❆ أدوات Manus</span>
        <button onClick={() => { setShowSearch(!showSearch); setShowImgTool(false); setShowCodeRun(false); }} disabled={disabled}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium smooth border ${
            showSearch ? 'bg-amber-100 text-amber-700 border-amber-300' : 'bg-white/60 text-ink-muted border-line hover:border-amber-300 hover:text-amber-700'
          }`}>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-3.5 h-3.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          بحث الويب
        </button>
        <button onClick={() => { setShowImgTool(!showImgTool); setShowSearch(false); setShowCodeRun(false); }} disabled={disabled}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium smooth border ${
            showImgTool ? 'bg-amber-100 text-amber-700 border-amber-300' : 'bg-white/60 text-ink-muted border-line hover:border-amber-300 hover:text-amber-700'
          }`}>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-3.5 h-3.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
          </svg>
          توليد صورة
        </button>
        <button onClick={() => { setShowCodeRun(!showCodeRun); setShowSearch(false); setShowImgTool(false); }} disabled={disabled}
          className={`flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-medium smooth border ${
            showCodeRun ? 'bg-amber-100 text-amber-700 border-amber-300' : 'bg-white/60 text-ink-muted border-line hover:border-amber-300 hover:text-amber-700'
          }`}>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-3.5 h-3.5">
            <path strokeLinecap="round" strokeLinejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
          </svg>
          تنفيذ كود
        </button>
        <span className="text-[10px] text-amber-600/60 mr-auto">مجاني دائماً</span>
      </div>

      {/* Web Search Panel */}
      {showSearch && (
        <div className="max-w-3xl mx-auto px-3 pb-3">
          <div className="bg-white/80 rounded-xl border border-amber-200 p-3">
            <div className="flex gap-2 mb-2">
              <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && runWebSearch()}
                placeholder="ابحث في الويب..."
                className="flex-1 bg-transparent border border-line rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-amber-400" />
              <button onClick={runWebSearch} disabled={searching || !searchQuery.trim()}
                className="px-3 py-1.5 bg-amber-500 text-white rounded-lg text-sm font-medium hover:bg-amber-600 smooth disabled:opacity-50">
                {searching ? '...' : 'بحث'}
              </button>
            </div>
            {searchResults && (
              <div className="space-y-2 max-h-48 overflow-y-auto">
                {searchResults.map((r, i) => (
                  <div key={i} className="text-xs border-b border-line/50 pb-2">
                    <a href={r.url} target="_blank" rel="noopener" className="font-semibold text-amber-700 hover:underline">{r.title}</a>
                    <p className="text-ink-muted mt-0.5 leading-relaxed">{r.snippet}</p>

                  className="w-full mt-2 py-1.5 bg-amber-500 text-white rounded-lg text-xs font-medium hover:bg-amber-600 smooth">
                  ➕ أضف للمحادثة وحلّل بالنماذج

      {/* Image Generation Panel */}

            <p className="text-[10px] text-ink-dim mt-1">❆ Manus Image API - بدون DALL-E key</p>
          </div>

      {/* Code Execution Panel */}
      {showCodeRun && (
        <div className="max-w-3xl mx-auto px-3 pb-3">

              }`}>
                {codeResult.output && <pre className="whitespace-pre-wrap">{codeResult.output}</pre>}
                {codeResult.error && <pre className="whitespace-pre-wrap text-red-600">{codeResult.error}</pre>}
                {codeResult.execution_time_seconds && (
                  <div className="text-[10px] text-ink-dim mt-1">⏱ {codeResult.execution_time_seconds.toFixed(3)}s</div>
                )}
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

function InputBar({ onSend, disabled, placeholder, prefill, onOpenImageGen }) {
  const [text, setText] = useState('');
  const [images, setImages] = useState([]);
  const [recording, setRecording] = useState(false);
  const taRef = useRef(null);
  const fileRef = useRef(null);
  const recogRef = useRef(null);

  useEffect(() => {
    if (prefill) {
      setText(prefill);
      if (taRef.current) {
        taRef.current.style.height = 'auto';
        taRef.current.style.height = Math.min(taRef.current.scrollHeight, 200) + 'px';
        taRef.current.focus();
        taRef.current.setSelectionRange(prefill.length, prefill.length);
      }
    }
  }, [prefill]);

  const send = () => {
    const tval = text.trim();
    if ((!tval && images.length === 0) || disabled) return;
    onSend(tval, images.map(i => i.dataUrl));
    setText('');
    setImages([]);
    if (taRef.current) taRef.current.style.height = 'auto';
  };
  const onKey = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };
  const onChange = e => {
    setText(e.target.value);
    if (taRef.current) { taRef.current.style.height = 'auto'; taRef.current.style.height = Math.min(taRef.current.scrollHeight, 200) + 'px'; }
  };

  const onPickImage = (e) => {
    const files = Array.from(e.target.files || []);
    if (files.length === 0) return;
    // حد أقصى 4 صور، 5MB لكل واحدة
    const MAX_BYTES = 5 * 1024 * 1024;
    files.slice(0, 4 - images.length).forEach(f => {
      if (!f.type.startsWith('image/')) { alert('اختر ملفات صور فقط'); return; }
      if (f.size > MAX_BYTES) { alert(`الصورة ${f.name} أكبر من 5MB`); return; }
      const reader = new FileReader();
      reader.onload = () => setImages(prev => [...prev, { name: f.name, dataUrl: reader.result }]);
      reader.readAsDataURL(f);
    });
    e.target.value = '';
  };

  const removeImage = (idx) => setImages(prev => prev.filter((_, i) => i !== idx));

  // STT - Web Speech API (مجاني، native للمتصفح)
  const startRecording = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('متصفحك لا يدعم التعرّف على الصوت. جرّب Chrome/Edge.'); return; }
    const r = new SR();
    r.lang = document.documentElement.lang === 'en' ? 'en-US' : 'ar-SA';
    r.continuous = false;
    r.interimResults = true;
    r.onresult = (e) => {
      let final = '', interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const t = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += t; else interim += t;
      }
      const newText = (text || '').trim() + (final || interim);
      setText(newText);
      if (taRef.current) {
        taRef.current.style.height = 'auto';
        taRef.current.style.height = Math.min(taRef.current.scrollHeight, 200) + 'px';
      }
    };
    r.onend = () => setRecording(false);
    r.onerror = () => setRecording(false);
    recogRef.current = r;
    r.start();
    setRecording(true);
  };
  const stopRecording = () => { if (recogRef.current) recogRef.current.stop(); setRecording(false); };

  return (
    <div className="border-t border-line p-3 md:p-4 bg-paper">
      <div className="max-w-3xl mx-auto">
        <div className="card-soft rounded-2xl p-3 focus-within:border-brand/50 smooth">
          {/* Image previews */}
          {images.length > 0 && (
            <div className="flex flex-wrap gap-2 mb-3 pb-3 border-b border-line">
              {images.map((img, idx) => (
                <div key={idx} className="relative group">
                  <img src={img.dataUrl} alt={img.name} className="w-16 h-16 rounded-lg object-cover border border-line" />
                  <button onClick={() => removeImage(idx)}
                    className="absolute -top-1.5 -left-1.5 w-5 h-5 rounded-full bg-ink text-white text-xs flex items-center justify-center hover:bg-brand smooth">
                    ×
                  </button>
                </div>
              ))}
            </div>
          )}
          <textarea ref={taRef} value={text} onChange={onChange} onKeyDown={onKey}
            placeholder={placeholder || 'اكتب سؤالك أو ارفع صورة...'} disabled={disabled} rows={1}
            className="w-full bg-transparent resize-none focus:outline-none text-ink placeholder-ink-dim min-h-[24px] max-h-[200px]" />
          <div className="flex items-center justify-between mt-2 pt-2 border-t border-line">
            <div className="flex items-center gap-1">
              <input ref={fileRef} type="file" hidden multiple accept="image/*" onChange={onPickImage} />
              <button onClick={() => fileRef.current?.click()} disabled={disabled || images.length >= 4}
                title="رفع صورة (Vision)"
                className="p-1.5 rounded-lg hover:bg-paper-soft text-ink-muted hover:text-ink smooth disabled:opacity-40">
                <Icon name="file" className="w-4 h-4" />
              </button>
              <button onClick={recording ? stopRecording : startRecording} disabled={disabled}
                title={recording ? 'إيقاف' : 'تسجيل صوتي'}
                className={`p-1.5 rounded-lg smooth ${recording ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'hover:bg-paper-soft text-ink-muted hover:text-ink'}`}>
                {recording ? (
                  <span className="flex items-center gap-1">
                    <span className="w-2 h-2 rounded-full bg-red-500 breathe"></span>
                    <span className="text-[10px] font-bold">مسجّل</span>
                  </span>
                ) : (
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                  </svg>
                )}
              </button>
              {onOpenImageGen && (
                <button onClick={onOpenImageGen} disabled={disabled}
                  title="توليد صورة بـ AI"
                  className="p-1.5 rounded-lg hover:bg-paper-soft text-ink-muted hover:text-ink smooth disabled:opacity-40">
                  <Icon name="sparkles" className="w-4 h-4" />
                </button>
              )}
              <span className="text-xs text-ink-dim font-medium mr-2">
                {recording ? '🔴 جارٍ التسجيل...' : disabled ? 'النماذج تعمل...' : (images.length > 0 ? `${images.length} صورة` : 'جاهز')}
              </span>
            </div>
            <Btn variant="primary" size="sm" onClick={send} disabled={(!text.trim() && images.length === 0) || disabled}>
              <span>إرسال</span><Icon name="send" className="w-3.5 h-3.5" />
            </Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function CodePreviewPanel({ messages, session }) {
  const [tab, setTab] = useState('preview');
  const [running, setRunning] = useState(false);
  const [runResult, setRunResult] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(0);

  const codeBlocks = useMemo(() => {
    const out = [];
    for (const m of messages) {
      if (m.role === 'agent') {
        const blocks = extractCodeBlocks(m.content);
        for (const b of blocks) out.push({ ...b, agent: m.agent_id, phase: m.phase });
      }
    }
    return out;
  }, [messages]);

  const current = codeBlocks[selectedIdx] || null;
  useEffect(() => {
    if (codeBlocks.length > 0 && selectedIdx >= codeBlocks.length) setSelectedIdx(codeBlocks.length - 1);
  }, [codeBlocks.length]);

  async function run() {
    if (!current) return;
    setRunning(true); setRunResult(null);
    try {
      const result = await api('/code/execute', { method: 'POST', body: JSON.stringify({ language: current.lang, code: current.code }) });
      setRunResult(result);
    } catch (e) {
      setRunResult({ stderr: e.message, stdout: '', exit_code: -1, timed_out: false, runtime_ms: 0 });
    } finally { setRunning(false); }
  }

  const htmlPreview = current?.lang === 'html' ? current.code : null;
  const codeRef = useRef(null);
  useEffect(() => {
    if (codeRef.current) {
      codeRef.current.querySelectorAll('code').forEach(b => { delete b.dataset.highlighted; hljs.highlightElement(b); });
    }
  }, [current?.code]);

  return (
    <div className="h-full flex flex-col bg-surface">
      <div className="flex items-center justify-between border-b border-line px-4 py-2.5">
        <div className="flex gap-1">
          <TabBtn active={tab==='preview'} onClick={() => setTab('preview')}><Icon name="eye" className="w-3.5 h-3.5" /> Preview</TabBtn>
          <TabBtn active={tab==='code'} onClick={() => setTab('code')}><Icon name="code" className="w-3.5 h-3.5" /> Code</TabBtn>
          <TabBtn active={tab==='output'} onClick={() => setTab('output')}><Icon name="play" className="w-3.5 h-3.5" /> Output</TabBtn>
        </div>
        <div className="flex items-center gap-2 text-xs">
          {codeBlocks.length > 1 && (
            <select value={selectedIdx} onChange={e => setSelectedIdx(parseInt(e.target.value))}
              className="bg-paper-soft border border-line rounded-md px-2 py-1 text-xs">
              {codeBlocks.map((b, i) => <option key={i} value={i}>كتلة {i+1} ({b.lang})</option>)}
            </select>
          )}
          {current && current.lang !== 'html' && (
            <Btn variant="brand" size="sm" onClick={run} disabled={running}>
              {running ? '...' : <><Icon name="play" className="w-3 h-3" />تشغيل</>}
            </Btn>
          )}
        </div>
      </div>

      <div className="flex-1 overflow-hidden">
        {!current ? (
          <div className="h-full flex items-center justify-center text-ink-dim text-sm">
            <div className="text-center">
              <div className="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-paper-soft text-ink mb-3">
                <Icon name="code" className="w-5 h-5" />
              </div>
              <p className="font-medium">اطلب من النماذج كتابة كود</p>
              <p className="text-xs text-ink-dim mt-1">سيظهر هنا للمعاينة والتشغيل</p>
            </div>
          </div>
        ) : tab === 'preview' ? (
          htmlPreview ? (
            <iframe className="preview-frame" sandbox="allow-scripts" srcDoc={htmlPreview} />
          ) : (
            <div className="h-full overflow-auto p-4 bg-paper-soft">
              <div className="text-xs text-ink-dim mb-2 font-semibold">Preview غير متاح لهذه اللغة. اضغط ▶ تشغيل.</div>
              <pre ref={codeRef}><code className={`language-${current.lang}`}>{current.code}</code></pre>
            </div>
          )
        ) : tab === 'code' ? (
          <div className="h-full overflow-auto p-4 bg-paper-soft">
            <div className="text-xs text-ink-dim mb-2 flex items-center justify-between font-semibold">
              <span>{current.lang}{current.agent ? ` · ${AGENT_META[current.agent]?.name}` : ''}{current.phase ? ` · ${PHASE_LABELS[current.phase]?.label || current.phase}` : ''}</span>
              <button onClick={() => navigator.clipboard.writeText(current.code)}
                className="text-xs bg-surface hover:bg-paper border border-line px-2 py-0.5 rounded smooth">نسخ</button>
            </div>
            <pre ref={codeRef}><code className={`language-${current.lang}`}>{current.code}</code></pre>
          </div>
        ) : (
          <div className="h-full overflow-auto p-4 font-mono text-xs bg-paper-soft">
            {!runResult ? (
              <div className="text-ink-dim">لم يُشغّل بعد. اضغط ▶ تشغيل.</div>
            ) : (
              <div>
                <div className={`mb-3 px-3 py-1.5 rounded-lg inline-block text-xs font-semibold ${runResult.exit_code === 0 ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'}`}>
                  exit={runResult.exit_code} · {runResult.runtime_ms}ms{runResult.timed_out ? ' · TIMEOUT' : ''}
                </div>
                {runResult.stdout && (
                  <div className="mb-3">
                    <div className="text-ink-dim mb-1 font-semibold">STDOUT</div>
                    <pre className="bg-surface border border-line rounded-lg p-3 overflow-auto whitespace-pre-wrap text-ink">{runResult.stdout}</pre>
                  </div>
                )}
                {runResult.stderr && (
                  <div>
                    <div className="text-red-600 mb-1 font-semibold">STDERR</div>
                    <pre className="bg-red-50 border border-red-200 rounded-lg p-3 overflow-auto whitespace-pre-wrap text-red-700">{runResult.stderr}</pre>
                  </div>
                )}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function FilesPanel({ sessionId }) {
  const [files, setFiles] = useState([]);
  const [uploading, setUploading] = useState(false);
  const [error, setError] = useState('');

  const load = useCallback(async () => {
    try { const fs = await api(`/files?session_id=${sessionId}`); setFiles(fs); }
    catch (e) { setError(e.message); }
  }, [sessionId]);
  useEffect(() => { load(); }, [load]);

  async function upload(e) {
    const file = e.target.files?.[0]; if (!file) return;
    setUploading(true); setError('');
    try {
      const fd = new FormData(); fd.append('file', file);
      const t = getToken();
      const res = await fetch(`${API_BASE}/files?session_id=${sessionId}`, { method: 'POST', headers: { Authorization: `Bearer ${t}` }, body: fd });
      if (!res.ok) throw new Error((await res.json()).detail || 'upload failed');
      e.target.value = ''; load();
    } catch (e) { setError(e.message); }
    finally { setUploading(false); }
  }
  async function remove(uuid) {
    if (!confirm('حذف الملف؟')) return;
    try { await api(`/files/${uuid}`, { method: 'DELETE' }); load(); }
    catch (e) { setError(e.message); }
  }

  return (
    <div className="h-full flex flex-col bg-surface">
      <div className="border-b border-line px-4 py-3 flex items-center justify-between">
        <h3 className="font-bold tracking-tight">ملفات المشروع</h3>
        <label className="cursor-pointer">
          <Btn variant="primary" size="sm" as="span">
            <Icon name="plus" className="w-3.5 h-3.5" />
            {uploading ? '...' : 'رفع'}
          </Btn>
          <input type="file" hidden onChange={upload} />
        </label>
      </div>
      {error && <div className="m-4 bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 text-xs">{error}</div>}
      <div className="flex-1 overflow-y-auto p-3">
        {files.length === 0 ? (
          <div className="text-center text-ink-dim py-12 text-sm">
            <div className="inline-flex items-center justify-center w-12 h-12 rounded-2xl bg-paper-soft text-ink mb-3">
              <Icon name="folder" className="w-5 h-5" />
            </div>
            <p className="font-medium">لا توجد ملفات</p>
            <p className="text-xs text-ink-dim mt-1">حد أقصى 10MB · text/image/pdf/json/zip</p>
          </div>
        ) : (
          <div className="space-y-2">
            {files.map(f => (
              <div key={f.id} className="card-soft rounded-lg p-3 flex items-center gap-3 smooth hover:border-line-strong">
                <div className="w-9 h-9 rounded-lg bg-paper-soft flex items-center justify-center flex-shrink-0 text-ink">
                  <Icon name="file" className="w-4 h-4" />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate">{f.name}</div>
                  <div className="text-xs text-ink-dim">{(f.size_bytes / 1024).toFixed(1)} KB · {f.mime_type}</div>
                </div>
                <a href={`${API_BASE}/files/${f.file_uuid}`} target="_blank" className="text-xs text-brand hover:underline font-semibold">↓</a>
                <button onClick={() => remove(f.file_uuid)} className="text-xs text-red-500 hover:text-red-700 smooth"><Icon name="trash" className="w-3.5 h-3.5" /></button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function SettingsModal({ user, onClose }) {
  const [keys, setKeys] = useState([]);

  const [plans, setPlans] = useState(null);
  const [loading, setLoading] = useState(true);
  const [provider, setProvider] = useState('anthropic');
  const [keyInput, setKeyInput] = useState('');
  const [adding, setAdding] = useState(false);
  const [error, setError] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [k, u, p] = await Promise.all([api('/api-keys'), api('/usage/me'), api('/billing/plans')]);
      setKeys(k); setUsage(u); setPlans(p);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load]);

  async function addKey(e) {
    e.preventDefault(); setAdding(true); setError('');
    try { await api('/api-keys', { method: 'POST', body: JSON.stringify({ provider, key: keyInput }) }); setKeyInput(''); load(); }
    catch (e) { setError(e.message); } finally { setAdding(false); }
  }

    if (!confirm(`حذف مفتاح ${prov}؟`)) return;

            <div className="bg-paper-soft rounded-xl p-5">
              <div className="flex items-center justify-between mb-3">
                <div>
                  <div className="text-2xl font-display font-extrabold uppercase tracking-tight">{user.plan}</div>
                  <div className="text-xs text-ink-dim">{user.plan === 'free' ? 'الخطة المجانية' : 'مدفوعة'}</div>

                    <Btn variant="brand" size="sm" onClick={() => upgradeTo('pro')}>محترف · {plans.pro.price_lyd} د.ل</Btn>
                  </div>

              {usage && (<>
                <div className="text-xs text-ink-muted mb-1.5 flex justify-between font-semibold">
                  <span>{usage.total_messages} / {usage.limit} رسالة</span>
                  <span>${(usage.total_cost_usd || 0).toFixed(4)}</span>
                </div>
                <div className="h-1.5 bg-surface rounded-full overflow-hidden">
                  <div className={`h-full ${usage.limit_reached ? 'bg-red-500' : 'bg-brand'}`}
                    style={{ width: `${Math.min(100, (usage.total_messages / Math.max(1, usage.limit)) * 100)}%` }} />
                </div>
              </>)}
            </div>
          </section>

          <section>
            <div className="text-xs font-bold uppercase tracking-widest text-ink-dim mb-3">مفاتيح API الخاصة بك</div>
            <p className="text-sm text-ink-muted mb-4 leading-relaxed">

            <form onSubmit={addKey} className="flex gap-2 mb-3">
              <select value={provider} onChange={e => setProvider(e.target.value)} className="bg-paper-soft border border-line rounded-lg px-3 py-2 text-sm focus:border-brand focus-ring">
                <option value="anthropic">Anthropic</option><option value="openai">OpenAI</option>
                <option value="gemini">Gemini</option><option value="deepseek">DeepSeek</option>
              </select>
              <input type="password" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="sk-..." required minLength={10}
                className="flex-1 bg-paper-soft border border-line rounded-lg px-3 py-2 text-sm focus:border-brand focus-ring font-mono" />
              <Btn type="submit" variant="primary" size="md" disabled={adding}>{adding ? '...' : 'إضافة'}</Btn>
            </form>

             keys.length === 0 ? <div className="text-center text-ink-dim text-sm py-4">لا توجد مفاتيح</div> : (
              <div className="space-y-2">
                {keys.map(k => (
                  <div key={k.id} className="flex items-center justify-between bg-paper-soft rounded-lg px-3 py-2">
                    <div><div className="font-bold text-sm uppercase tracking-tight">{k.provider}</div><div className="font-mono text-xs text-ink-dim">{k.masked_key}</div></div>
                    <button onClick={() => delKey(k.provider)} className="text-red-500 hover:text-red-700 text-xs font-semibold smooth">حذف</button>
                  </div>
                ))}
              </div>
            )}
            {error && <div className="bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2 mt-3 text-sm">{error}</div>}
          </section>
        </div>
      </div>
    </div>
  );
}

function LimitModal({ info, onClose }) {

    <div className="fixed inset-0 z-50 bg-ink/50 flex items-center justify-center p-4 fade-in">

    </div>

}

function AdminPage({ onClose }) {
  const [stats, setStats] = useState(null);
  const [users, setUsers] = useState([]);
  const [threads, setThreads] = useState([]);
  const [supportStats, setSupportStats] = useState(null);
  const [tab, setTab] = useState('stats');
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const [s, u, t, ss] = await Promise.all([
        api('/admin/stats'), api('/admin/users'),
        api('/support/admin/threads'), api('/support/admin/stats'),
      ]);
      setStats(s); setUsers(u); setThreads(t); setSupportStats(ss);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load]);

  // Auto-refresh threads every 10s while on inbox tab
  useEffect(() => {
    if (tab !== 'inbox') return;
    const id = setInterval(async () => {
      try {
        const [t, ss] = await Promise.all([
          api('/support/admin/threads'), api('/support/admin/stats')
        ]);
        setThreads(t); setSupportStats(ss);
      } catch (e) {}
    }, 10000);
    return () => clearInterval(id);
  }, [tab]);

  async function changePlan(userId, plan) {
    try { await api(`/admin/users/${userId}?plan=${plan}`, { method: 'PATCH' }); load(); } catch (e) { alert(e.message); }
  }

  if (loading) return <div className="flex-1 flex items-center justify-center text-ink-dim">...</div>;
  if (error) return <div className="flex-1 p-8 text-red-600">{error}</div>;

  return (
    <div className="flex-1 overflow-y-auto bg-paper">
      <header className="border-b border-line px-6 py-4 flex items-center justify-between sticky top-0 bg-paper z-10">

      <div className="px-6 pt-5">
        <div className="flex gap-1 mb-6 border-b border-line">
          <AdminTab active={tab==='stats'} onClick={() => setTab('stats')}>إحصائيات</AdminTab>
          <AdminTab active={tab==='users'} onClick={() => setTab('users')}>المستخدمون · {users.length}</AdminTab>
          <AdminTab active={tab==='inbox'} onClick={() => setTab('inbox')}>
            مركز الرسائل
            {supportStats?.open > 0 && <span className="mr-2 inline-flex items-center justify-center min-w-[20px] h-5 rounded-full bg-brand text-white text-[10px] font-bold px-1.5">{supportStats.open}</span>}

            <StatCard label="مدفوعون" value={stats.users.paid} sub={`MRR $${stats.revenue.mrr_estimate_usd}`} />

            <StatCard label="تكلفة هذا الشهر" value={`$${stats.this_month.cost_usd.toFixed(2)}`} sub={`${(stats.this_month.input_tokens + stats.this_month.output_tokens).toLocaleString()} tokens`} />
            <div className="col-span-full card-soft rounded-2xl p-6">
              <h3 className="font-bold mb-4 tracking-tight">حسب النموذج</h3>

// MESSAGE CENTER (admin) — master/detail
// ============================================================
function MessageCenter({ threads, onRefresh }) {
  const [selectedId, setSelectedId] = useState(null);
  const [filter, setFilter] = useState('all'); // all | open | closed | unread | chat | contact
  const [thread, setThread] = useState(null);
  const [reply, setReply] = useState('');
  const [sending, setSending] = useState(false);
  const [err, setErr] = useState('');
  const scrollRef = useRef(null);

  const filtered = useMemo(() => {
    return threads.filter(t => {
      if (filter === 'open')    return t.status === 'open';
      if (filter === 'closed')  return t.status === 'closed';
      if (filter === 'unread')  return t.is_unread;
      if (filter === 'chat')    return t.channel === 'chat';
      if (filter === 'contact') return t.channel === 'contact';
      return true;
    });
  }, [threads, filter]);

  // Auto-select first thread
  useEffect(() => {
    if (!selectedId && filtered.length > 0) setSelectedId(filtered[0].id);
  }, [filtered, selectedId]);

  // Load selected thread (with messages)
  useEffect(() => {
    if (!selectedId) { setThread(null); return; }
    api(`/support/admin/threads/${selectedId}`).then(setThread).catch(() => {});
  }, [selectedId]);

  // Auto-refresh selected thread every 5s
  useEffect(() => {
    if (!selectedId) return;
    const id = setInterval(() => {
      api(`/support/admin/threads/${selectedId}`).then(setThread).catch(() => {});
    }, 5000);
    return () => clearInterval(id);
  }, [selectedId]);

  // Scroll to bottom on new messages
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [thread?.messages?.length]);

  async function sendReply() {
    if (!reply.trim() || sending || !selectedId) return;
    setSending(true); setErr('');
    try {
      await api(`/support/admin/threads/${selectedId}/reply`, {
        method: 'POST',
        body: JSON.stringify({ content: reply.trim() }),
      });
      setReply('');
      const t = await api(`/support/admin/threads/${selectedId}`);
      setThread(t);
      onRefresh();
    } catch (e) { setErr(e.message); }
    finally { setSending(false); }
  }

  async function toggleStatus() {
    if (!thread) return;
    const newStatus = thread.status === 'open' ? 'closed' : 'open';
    try {
      await api(`/support/admin/threads/${selectedId}`, {
        method: 'PATCH', body: JSON.stringify({ status: newStatus }),
      });
      const t = await api(`/support/admin/threads/${selectedId}`);
      setThread(t); onRefresh();
    } catch (e) { alert(e.message); }
  }

  return (
    <div className="card-soft rounded-2xl overflow-hidden mb-8" style={{height: 'calc(100vh - 220px)', minHeight: 500}}>
      <div className="flex h-full">
        {/* LEFT: Thread list */}
        <div className="w-80 border-l border-line bg-paper-soft flex flex-col">
          {/* Filters */}
          <div className="p-3 border-b border-line flex flex-wrap gap-1">
            {[
              {k:'all', l:'الكل'}, {k:'unread', l:'غير مقروء'},
              {k:'open', l:'مفتوح'}, {k:'chat', l:'دردشة'}, {k:'contact', l:'تواصل'}
            ].map(f => (
              <button key={f.k} onClick={() => setFilter(f.k)}
                className={`px-2.5 py-1 text-[11px] rounded-md font-semibold smooth ${
                  filter === f.k ? 'bg-ink text-paper' : 'bg-surface text-ink-muted hover:text-ink'
                }`}>
                {f.l}
              </button>
            ))}
          </div>

          {/* List */}
          <div className="flex-1 overflow-y-auto">
            {filtered.length === 0 ? (
              <div className="text-center text-ink-dim text-sm py-12">لا توجد رسائل</div>
            ) : filtered.map(t => (
              <button key={t.id} onClick={() => setSelectedId(t.id)}
                className={`w-full text-right px-4 py-3 border-b border-line/50 smooth ${
                  selectedId === t.id ? 'bg-surface' : 'hover:bg-surface/50'
                }`}>
                <div className="flex items-start justify-between gap-2 mb-1">
                  <div className="font-bold text-sm truncate flex items-center gap-2">
                    {t.is_unread && <span className="w-2 h-2 rounded-full bg-brand flex-shrink-0"></span>}
                    <span className="truncate">{t.name}</span>
                  </div>
                  <span className="text-[10px] text-ink-dim flex-shrink-0">
                    {new Date(t.last_message_at).toLocaleDateString('ar', {month:'short', day:'numeric'})}
                  </span>
                </div>
                <div className="text-xs text-ink-dim truncate mb-1 font-mono">{t.email}</div>
                {t.subject && <div className="text-xs font-semibold truncate">{t.subject}</div>}
                {t.preview && <div className="text-xs text-ink-muted truncate mt-0.5">{t.preview}</div>}
                <div className="flex items-center gap-1.5 mt-1.5">
                  <span className={`text-[9px] uppercase tracking-widest font-bold px-1.5 py-0.5 rounded ${
                    t.channel === 'chat' ? 'bg-blue-50 text-blue-700' : 'bg-paper text-ink-muted'
                  }`}>
                    {t.channel === 'chat' ? 'دردشة' : 'تواصل'}
                  </span>
                  {t.status === 'closed' && (
                    <span className="text-[9px] uppercase tracking-widest font-bold px-1.5 py-0.5 rounded bg-paper text-ink-dim">مغلق</span>
                  )}
                  <span className="text-[9px] text-ink-dim">{t.message_count} رسالة</span>
                </div>
              </button>
            ))}
          </div>
        </div>

        {/* RIGHT: Conversation */}
        <div className="flex-1 flex flex-col bg-paper">
          {!thread ? (
            <div className="flex-1 flex items-center justify-center text-ink-dim text-sm">
              اختر محادثة من اليمين
            </div>
          ) : (
            <>
              {/* Thread header */}
              <div className="border-b border-line p-4 flex items-center justify-between">
                <div className="min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <h3 className="font-bold tracking-tight truncate">{thread.name}</h3>
                    <span className={`text-[10px] uppercase tracking-widest font-bold px-1.5 py-0.5 rounded ${
                      thread.channel === 'chat' ? 'bg-blue-50 text-blue-700' : 'bg-paper-soft text-ink-muted'
                    }`}>
                      {thread.channel === 'chat' ? 'دردشة' : 'تواصل'}
                    </span>
                  </div>
                  <div className="text-xs text-ink-dim font-mono">{thread.email}{thread.phone && ` · ${thread.phone}`}</div>
                  {thread.subject && <div className="text-xs font-semibold mt-0.5">{thread.subject}</div>}
                </div>
                <div className="flex items-center gap-2">
                  <a href={`mailto:${thread.email}`} title="إرسال بريد">
                    <Btn variant="secondary" size="sm">بريد</Btn>
                  </a>
                  <Btn variant={thread.status === 'open' ? 'secondary' : 'brand'} size="sm" onClick={toggleStatus}>
                    {thread.status === 'open' ? 'إغلاق' : 'إعادة فتح'}
                  </Btn>
                </div>
              </div>

              {/* Messages */}
              <div ref={scrollRef} className="flex-1 overflow-y-auto p-5 space-y-4 paper-grain">
                {thread.messages.length === 0 ? (
                  <div className="text-center text-ink-dim text-sm">لا توجد رسائل بعد</div>
                ) : thread.messages.map(m => (
                  <AdminChatBubble key={m.id} msg={m} />
                ))}
              </div>

              {/* Reply box */}
              {thread.status === 'open' ? (
                <div className="border-t border-line p-4 bg-surface-soft">
                  {err && <div className="bg-red-50 border border-red-200 text-red-700 rounded-md px-2 py-1 text-xs mb-2">{err}</div>}
                  <div className="flex gap-2 items-end">
                    <textarea
                      value={reply} onChange={e => setReply(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendReply(); } }}
                      placeholder="اكتب ردّك... (Ctrl+Enter للإرسال)" rows={3}
                      className="flex-1 bg-surface border border-line rounded-lg px-3 py-2 text-sm focus:border-brand focus-ring smooth resize-none" />
                    <Btn variant="primary" size="md" onClick={sendReply} disabled={!reply.trim() || sending}>
                      {sending ? '...' : <><Icon name="send" className="w-4 h-4" /><span>إرسال</span></>}
                    </Btn>
                  </div>
                </div>
              ) : (
                <div className="border-t border-line p-4 bg-paper-soft text-center text-sm text-ink-dim">
                  هذا الخيط مغلق · أعد فتحه للرد
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function AdminChatBubble({ msg }) {
  const isAdmin = msg.sender === 'admin';
  return (
    <div className={`flex gap-2.5 fade-in ${isAdmin ? 'flex-row-reverse' : ''}`}>
      <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 text-xs font-bold ${
        isAdmin ? 'bg-brand text-white' : 'bg-paper-soft text-ink border border-line'
      }`}>
        {isAdmin ? 'L' : (msg.sender_name?.charAt(0) || '?')}
      </div>
      <div className="max-w-[70%]">
        <div className={`px-4 py-2.5 rounded-2xl text-sm leading-relaxed ${
          isAdmin
            ? 'bg-brand-soft border border-brand/20 text-ink rounded-tr-md'
            : 'bg-surface border border-line text-ink rounded-tl-md'
        }`}>
          <div className="whitespace-pre-wrap">{msg.content}</div>
        </div>
        <div className={`text-[10px] text-ink-dim mt-1 ${isAdmin ? 'text-left' : ''}`}>
          {isAdmin ? `${msg.sender_name || 'Admin'} · ` : ''}
          {new Date(msg.created_at).toLocaleString('ar', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'short'})}
        </div>
      </div>
    </div>
  );
}

function ImageGeneratorModal({ onClose, onGenerated }) {

                className="w-full bg-paper-soft border border-line rounded-lg px-3 py-2.5 text-sm focus:border-brand focus-ring smooth">

function VideoLibrary({ onClose }) {
  const [videos, setVideos] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState('');
  const [showGen, setShowGen] = useState(false);
  const [enabled, setEnabled] = useState(true);
  const [models, setModels] = useState([]);

  const reload = useCallback(() => {
    setLoading(true);
    Promise.all([api('/video/my').catch(() => []), api('/video/models').catch(() => ({models:[],enabled:false}))])
      .then(([v, m]) => { setVideos(v); setModels(m.models || []); setEnabled(m.enabled); setLoading(false); });
  }, []);
  useEffect(() => { reload(); }, [reload]);

  // Auto-poll for processing videos
  useEffect(() => {
    const proc = videos.filter(v => v.status === 'processing');
    if (proc.length === 0) return;
    const id = setInterval(async () => {
      for (const v of proc) {
        try {
          const r = await api(`/video/status/${v.id}`);
          if (r.status !== 'processing') reload();
        } catch (e) {}
      }
    }, 5000);
    return () => clearInterval(id);
  }, [videos, reload]);

  return (
    <div className="flex-1 overflow-y-auto bg-paper">
      <header className="border-b border-line px-6 py-4 flex items-center justify-between sticky top-0 bg-paper z-10">
        <div className="flex items-center gap-2">
          <Icon name="play" className="w-5 h-5 text-brand" strokeWidth={2} />
          <h1 className="text-xl font-bold tracking-tight">مكتبة الفيديو</h1>
        </div>
        <div className="flex items-center gap-2">
          <Btn variant="brand" size="sm" onClick={() => setShowGen(true)} disabled={!enabled}>
            <Icon name="plus" className="w-4 h-4" /><span>توليد فيديو</span>
          </Btn>
          <button onClick={onClose} className="text-ink-dim hover:text-ink p-2"><Icon name="close" className="w-5 h-5" /></button>
        </div>
      </header>

      <div className="px-6 py-6">
        {!enabled && (
          <div className="bg-yellow-50 border border-yellow-200 rounded-2xl p-5 mb-6">
            <h3 className="font-bold text-yellow-900 mb-1">⚙️ توليد الفيديو يحتاج إعداد</h3>
            <p className="text-sm text-yellow-800 leading-relaxed">
              لتفعيل توليد الفيديو، أضف <code className="font-mono bg-yellow-100 px-1 rounded">REPLICATE_API_TOKEN</code> في ملف <code className="font-mono">.env</code>.

              <Icon name="play" className="w-7 h-7" strokeWidth={1.5} />

            <h3 className="text-lg font-bold mb-2 tracking-tight">لا توجد فيديوهات بعد</h3>

function MainApp({ user: initialUser, onLogout }) {
  const [user, setUser] = useState(initialUser);
  const [view, setView] = useState('home');
  const [sessions, setSessions] = useState([]);
  const [currentId, setCurrentId] = useState(null);
  const [messages, setMessages] = useState([]);
  const [agents, setAgents] = useState([]);
  const [usage, setUsage] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [limitInfo, setLimitInfo] = useState(null);
  const [currentPhase, setCurrentPhase] = useState(null);
  const [isThinking, setIsThinking] = useState(false);
  const [awaitingChunks, setAwaitingChunks] = useState(false);
  const [sidePanel, setSidePanel] = useState(true);
  const wsRef = useRef(null);

  const currentSession = useMemo(() => sessions.find(s => s.id === currentId), [sessions, currentId]);

  const loadAll = useCallback(async () => {
    try {
      const [s, a, u] = await Promise.all([api('/sessions'), api('/agents'), api('/usage/me')]);
      const stored = JSON.parse(sessionStorage.getItem('lp_kinds') || '{}');
      setSessions(s.map(x => ({ ...x, kind: stored[x.id] || 'chat' })));
      setAgents(a); setUsage(u);
    } catch (e) { if (e.status === 401) onLogout(); }
  }, [onLogout]);
  useEffect(() => { loadAll(); }, [loadAll]);

  // إذا فيه prompt محفوظ من Hero chat box → أنشئ جلسة تلقائياً وارسله
  const [pendingPrompt, setPendingPrompt] = useState(() => localStorage.getItem('lp_pending_prompt'));
  useEffect(() => {
    if (!pendingPrompt || agents.length === 0) return;
    const availableAgents = agents.filter(a => a.available).map(a => a.id);
    if (availableAgents.length === 0) return;
    // أنشئ جلسة جديدة وادخلها
    (async () => {
      try {
        const defaults = availableAgents.slice(0, Math.max(2, availableAgents.length >= 2 ? 2 : 1));
        const v = VIEW_KINDS.chat;
        const s = await api('/sessions', { method: 'POST', body: JSON.stringify({
          title: pendingPrompt.slice(0, 60),
          default_mode: defaults.length >= 2 ? 'consensus' : 'solo',
          default_agents: defaults,
        })});
        const stored = JSON.parse(sessionStorage.getItem('lp_kinds') || '{}');
        stored[s.id] = 'chat'; sessionStorage.setItem('lp_kinds', JSON.stringify(stored));
        setSessions(prev => [{ ...s, kind: 'chat' }, ...prev]);
        setCurrentId(s.id);
        setView('session');
        // امسح الـ prompt - سيُرسل بعد ما الـ WebSocket يفتح
        localStorage.removeItem('lp_pending_prompt');
        // احفظه مؤقتاً لإرساله بعد فتح WS
        sessionStorage.setItem('lp_auto_send', pendingPrompt);
        setPendingPrompt(null);
      } catch (e) { localStorage.removeItem('lp_pending_prompt'); setPendingPrompt(null); }
    })();
  }, [pendingPrompt, agents]);

  useEffect(() => {
    if (!currentId) { setMessages([]); return; }
    api(`/sessions/${currentId}`).then(b => setMessages(b.messages));
  }, [currentId]);

  useEffect(() => {
    if (!currentId) return;
    const ws = new WebSocket(`${WS_BASE}/chat/ws/${currentId}?token=${getToken()}`);
    wsRef.current = ws;
    ws.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      handleEvent(evt);
      // عند ready: لو فيه prompt محفوظ، ارسله تلقائياً
      if (evt.type === 'ready') {
        const pending = sessionStorage.getItem('lp_auto_send');
        if (pending) {
          sessionStorage.removeItem('lp_auto_send');
          setTimeout(() => sendMessage(pending), 200);
        }
      }
    };
    ws.onclose = () => { wsRef.current = null; };
    return () => { try { ws.close(); } catch (e) {} };
  }, [currentId]);

  function handleEvent(evt) {
    if (evt.type === 'ready') return;
    if (evt.type === 'auth_failed') { onLogout(); return; }
    if (evt.type === 'phase_change') { setCurrentPhase(evt.phase); return; }
    if (evt.type === 'turn_start') {
      setIsThinking(false); setAwaitingChunks(true);
      setMessages(m => [...m, { id: `temp-${Date.now()}-${evt.agent_id}`, role: 'agent', agent_id: evt.agent_id, agent_name: evt.agent_name, phase: evt.phase, content: '', _streaming: true, _temp: true }]);
      return;
    }
    if (evt.type === 'chunk') {
      setMessages(m => {
        const out = [...m];
        for (let i = out.length - 1; i >= 0; i--) {
          if (out[i]._temp && out[i].agent_id === evt.agent_id && out[i]._streaming) {
            out[i] = { ...out[i], content: out[i].content + evt.text }; break;
          }
        }
        return out;
      });
      return;
    }
    if (evt.type === 'turn_complete') {
      setMessages(m => {
        const out = [...m];
        for (let i = out.length - 1; i >= 0; i--) {
          if (out[i]._temp && out[i].agent_id === evt.agent_id && out[i]._streaming) {
            out[i] = { ...out[i], id: evt.message_id, _streaming: false, _temp: false, input_tokens: evt.input_tokens, output_tokens: evt.output_tokens, cost_usd: evt.cost_usd };
            break;
          }
        }
        return out;
      });
      return;
    }
    if (evt.type === 'complete') {
      setIsThinking(false); setAwaitingChunks(false); setCurrentPhase(null);
      api('/usage/me').then(setUsage).catch(() => {});
      return;
    }
    if (evt.type === 'limit_reached') {
      setIsThinking(false); setAwaitingChunks(false); setLimitInfo(evt);
      setMessages(m => m.filter(x => !x._temp));
      return;
    }
    if (evt.type === 'error') {
      setIsThinking(false); setAwaitingChunks(false);
      setMessages(m => [...m.filter(x => !x._temp), { id: `err-${Date.now()}`, role: 'agent', agent_id: evt.agent_id || 'system', agent_name: 'خطأ', content: `**خطأ:** ${evt.error}` }]);
    }
  }

  async function createSession(kind = 'chat') {
    const v = VIEW_KINDS[kind] || VIEW_KINDS.chat;
    const availableAgents = agents.filter(a => a.available).map(a => a.id);
    const defaults = availableAgents.slice(0, Math.max(v.minAgents, 2));
    try {
      const s = await api('/sessions', { method: 'POST', body: JSON.stringify({ title: `${v.label} جديد`, default_mode: v.mode, default_agents: defaults }) });
      const stored = JSON.parse(sessionStorage.getItem('lp_kinds') || '{}');
      stored[s.id] = kind; sessionStorage.setItem('lp_kinds', JSON.stringify(stored));
      setSessions(prev => [{ ...s, kind }, ...prev]);
      setCurrentId(s.id); setView('session');
    } catch (e) { alert(e.message); }
  }

  async function deleteSession(id) {
    try {
      await api(`/sessions/${id}`, { method: 'DELETE' });
      setSessions(prev => prev.filter(s => s.id !== id));
      if (currentId === id) { setCurrentId(null); setView('home'); }
    } catch (e) { alert(e.message); }
  }
  async function renameSession(id, title) {
    try {
      const updated = await api(`/sessions/${id}`, { method: 'PATCH', body: JSON.stringify({ title }) });
      setSessions(prev => prev.map(s => s.id === id ? { ...s, ...updated } : s));
    } catch (e) { alert(e.message); }
  }
  async function updateSessionConfig(patch) {
    if (!currentId) return;
    try {
      const updated = await api(`/sessions/${currentId}`, { method: 'PATCH', body: JSON.stringify(patch) });
      setSessions(prev => prev.map(s => s.id === currentId ? { ...s, ...updated } : s));
    } catch (e) { alert(e.message); }
  }
  async function exportSession() {
    if (!currentId) return;
    const t = getToken();
    const res = await fetch(`${API_BASE}/sessions/${currentId}/export?format=markdown`, { method: 'POST', headers: { Authorization: `Bearer ${t}` } });
    const text = await res.text();
    const blob = new Blob([text], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${currentSession?.title || 'session'}.md`; a.click();
    URL.revokeObjectURL(url);
  }
  function sendMessage(content, images = []) {
    if (!wsRef.current || wsRef.current.readyState !== WebSocket.OPEN) { alert('الاتصال منقطع'); return; }
    if (!currentSession) return;
    const agentsList = currentSession.default_agents || [];
    if (agentsList.length === 0) { alert('اختر نموذج واحد على الأقل'); return; }
    setMessages(m => [...m, {
      id: `temp-user-${Date.now()}`, role: 'user', content, images,
      _temp: true,
    }]);
    setIsThinking(true);
    wsRef.current.send(JSON.stringify({
      type: 'message', content, images,
      mode: currentSession.default_mode, agents: agentsList,
    }));
  }
  const hasSidePanel = currentSession && (currentSession.kind === 'code' || currentSession.kind === 'assistant');

  return (
    <div className="flex h-full bg-paper">
      <Sidebar
        user={user} sessions={sessions} currentId={currentId} view={view}
        onSelect={(id) => { setCurrentId(id); setView('session'); }}
        onCreate={() => { setView('home'); setCurrentId(null); }}
        onHome={() => { setView('home'); setCurrentId(null); }}
        onImages={() => { setView('images'); setCurrentId(null); }}
        onVideos={() => { setView('videos'); setCurrentId(null); }}
        onDelete={deleteSession} onRename={renameSession}
        onSettings={() => setShowSettings(true)}
        onLogout={() => { setToken(null); onLogout(); }}
        onAdmin={() => setView('admin')}
        usage={usage} />

      <main className="flex-1 flex flex-col h-full overflow-hidden">
        {view === 'admin' ? (
          <AdminPage onClose={() => setView('home')} />
        ) : view === 'images' ? (
          <ImageLibrary onClose={() => setView('home')} />
        ) : view === 'videos' ? (
          <VideoLibrary onClose={() => setView('home')} />
        ) : view === 'session' && currentSession ? (
          <ChatView
            session={currentSession} agents={agents}
            onUpdate={updateSessionConfig} onExport={exportSession}
            hasSidePanel={hasSidePanel} sidePanel={hasSidePanel && sidePanel}
            onTogglePanel={() => setSidePanel(p => !p)}
            messages={messages} currentPhase={currentPhase}
            isThinking={isThinking} awaitingChunks={awaitingChunks}
            onSend={sendMessage}
            onCloseSession={() => { setCurrentId(null); setView('home'); }} />
        ) : (
          <Home user={user} agents={agents} sessions={sessions} onCreate={createSession} />
        )}
      </main>

      {showSettings && <SettingsModal user={user} onClose={() => setShowSettings(false)} />}
      {limitInfo && <LimitModal info={limitInfo} onClose={() => setLimitInfo(null)} />}
    </div>
  );
}
